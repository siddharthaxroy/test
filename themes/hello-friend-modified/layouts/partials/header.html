<!-- Roy Water Lab Custom Header - Dark with Maroon Border -->
<header class="header">
  <div class="header__inner">
    <!-- Logo Section -->
    <div class="header__logo">
      {{ partial "logo.html" . }}
    </div>

    <!-- Navigation - Always Visible -->
    {{ if len $.Site.Menus.main }}
      <nav class="header__nav">
        <ul class="menu__main">
          {{ range .Site.Menus.main }}
            <li class="menu__item">
              <a href="{{ .URL }}" class="menu__link">{{ .Name }}</a>
            </li>
          {{ end }}
        </ul>
      </nav>
    {{ end }}

    <!-- Right Side - Theme Toggle -->
    <span class="header__right">
      <span class="theme-toggle">
        {{ partial "theme-icon.html" . }}
      </span>
    </span>
  </div>
</header>
