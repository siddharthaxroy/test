<!-- Top Bar -->
<div class="topbar">
  <div class="topbar-content">
    <span>Rutgers University</span>
    <a href="#">Accessibility</a>
  </div>
</div>

<!-- Dark Header -->
<header>
  <div class="header-inner">
    <div class="header-top">
      <div class="logo-section">
        <div class="logo-mark">R</div>
        <div class="logo-text">
          <h1>{{ .Site.Params.siteName }}</h1>
        </div>
      </div>
      <button class="contact-btn">Contact Us</button>
    </div>

    <div class="site-title-section">
      <h1>Siddhartha Roy's Research Group</h1>
      <span class="secondary-text">Rutgers University</span>
    </div>

    <nav>
      <ul>
        {{ range .Site.Menus.main }}
          <li>
            <a href="{{ .URL }}" {{ if eq .URL (printf "%s/" $.RelPermalink) }}class="active"{{ end }}>
              {{ .Name }}
            </a>
          </li>
        {{ end }}
      </ul>
    </nav>
  </div>
</header>
