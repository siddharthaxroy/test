{{ define "main" }}

<section class="page-header">
  <div class="page-header-inner">
    <h1 class="page-title">{{ .Title }}</h1>
    {{ if .Params.subtitle }}
      <p class="page-subtitle">{{ .Params.subtitle }}</p>
    {{ end }}
  </div>
</section>

<section class="page-content">
  <div class="container">
    {{ .Content }}
  </div>
</section>

{{ end }}
